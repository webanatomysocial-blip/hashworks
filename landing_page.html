<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashWorks | High-Tier Freelancing</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* Theme Variables */
            --primary: #4f46e5;
            --bg: #fdfdfe;
            --text: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-glow: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.08), transparent 70%);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg: #030712;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(3, 7, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --accent-glow: radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.12), transparent 70%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
        }

        /* --- Background Animation --- */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--accent-glow);
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -2;
            opacity: 0.4;
            animation: move linear infinite alternate;
        }

        .orb-1 {
            width: 40vw;
            height: 40vw;
            background: var(--primary);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 30vw;
            height: 30vw;
            background: #0ea5e9;
            bottom: -5%;
            right: -5%;
            animation-duration: 30s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        /* --- Navbar --- */
        .navbar {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            position: absolute;
            top: 0;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text);
        }

        .theme-toggle {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text);
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .intro-chip {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 span {
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.125rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 3rem;
            max-width: 600px;
            font-weight: 300;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
        }

        .cta-container {
            display: flex;
            gap: 1rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s backwards;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            text-decoration: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            background: var(--primary);
        }

        [data-theme="dark"] .btn-primary {
            background: #ffffff;
            color: #000000;
        }

        [data-theme="dark"] .btn-primary:hover {
            background: var(--primary);
            color: white;
        }

        /* --- Animations --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Footer --- */
        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 200;
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple-effect 0.6s linear;
        }

        @keyframes ripple-effect {
            from { width: 0; height: 0; opacity: 0.5; }
            to { width: 500px; height: 500px; opacity: 0; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
            .navbar { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="navbar">
        <a href="#" class="logo">
            <i data-lucide="hash"></i> hashworks
        </a>
        <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
            <i data-lucide="sun" id="sun-icon"></i>
            <i data-lucide="moon" id="moon-icon" style="display: none;"></i>
        </button>
    </header>

    <main>
        <div class="intro-chip">Next-Gen Freelancing</div>
        <h1>Seamless <span>talent</span> meets high-tier <span>innovation</span>.</h1>
        <p>Hashworks is a curated ecosystem where global expertise converges to solve complex challenges. Experience pure efficiency.</p>
        
        <div class="cta-container">
            <a href="/" class="btn btn-primary" id="home-btn">
                Go to Home Page<i data-lucide="arrow-right"></i>
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Hashworks &middot; Built for the modern workforce.
    </footer>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Theme Logic
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const html = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('hw-theme') || 'light';
        if (savedTheme === 'dark') {
            html.setAttribute('data-theme', 'dark');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
        }

        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
                localStorage.setItem('hw-theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
                localStorage.setItem('hw-theme', 'dark');
            }
        });

        // Button Ripple Effect
        const homeBtn = document.getElementById('home-btn');
        homeBtn.addEventListener('click', function(e) {
            const x = e.clientX - e.target.getBoundingClientRect().left;
            const y = e.clientY - e.target.getBoundingClientRect().top;
            
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            
            this.style.position = 'relative';
            this.style.overflow = 'hidden';
            this.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
</body>
</html>
